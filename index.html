<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Wedding Card Link Generator</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        .admin-card {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .full {
            grid-column: span 2;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9rem;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #6a1b9a;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button:hover {
            background: #4a148c;
        }
        button:disabled {
            background: #9c27b0;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            display: none;
            word-break: break-all;
        }
        .short-link {
            font-size: 1.2rem;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>Wedding Card Admin Panel</h2>
        <div class="grid">
            <div class="full">
                <label>Card URL (जिस URL पर डेटा भेजना है)</label>
                <input type="text" id="baseUrl" placeholder="https://yourwebsite.com/index.html">
            </div>

            <div class="full">
                <h3>Basic Info</h3>
            </div>
            <div>
                <label>Groom Image URL</label><input type="text" id="g_Image" value="assets/boy.png">
            </div>
            <div>
                <label>Bride Image URL</label><input type="text" id="b_Image" value="assets/girl.png">
            </div>

            <div>
                <label>Couple Name (English)</label><input type="text" id="coupleEnglishName" value="Sahil & Anupa">
            </div>
            <div>
                <label>Marriage Date</label><input type="text" id="marriageDate" value="23 अप्रैल 2026">
            </div>
            <div>
                <label>Timer Date & Time (सिस्टम के लिए)</label><input type="datetime-local" id="timerDate" value="2026-04-23T10:00">
            </div>


            <div class="full">
                <h3>Groom Info</h3>
            </div>
            <div>
                <label>Groom Name</label><input type="text" id="g_Name" value="साहिल लकड़ा">
            </div>
            <div>
                <label>Groom Grandfather</label><input type="text" id="g_grandfatherName" value="याकूब लकड़ा">
            </div>
            <div>
                <label>Groom Father</label><input type="text" id="g_fatherName" value="पीटर लकड़ा">
            </div>
            <div class="full">
                <label>Groom Address</label><input type="text" id="g_Address" value="बड़े कोड़ेपाल, बीजापुर">
            </div>

            <div class="full">
                <h3>Bride Info</h3>
            </div>
            <div>
                <label>Bride Name</label><input type="text" id="b_Name" value="अनुपा एक्का">
            </div>
            <div>
                <label>Bride Grandfather</label><input type="text" id="b_grandfatherName" value="याकूब लकड़ा">
            </div>
            <div>
                <label>Bride Father</label><input type="text" id="b_fatherName" value="पीटर लकड़ा">
            </div>
            <div class="full">
                <label>Bride Address</label><input type="text" id="b_Address" value="बड़े कोड़ेपाल, बीजापुर">
            </div>

            <div class="full">
                <h3>Events (Haldi, Marriage, Reception)</h3>
            </div>

            <div>
                <label>Haldi Date</label><input type="text" id="haldiDate" value="22 अप्रैल 2026">
            </div>
            <div>
                <label>Haldi Time</label><input type="text" id="haldiTime" value="प्रातः 10 बजे">
            </div>
            <div class="full">
                <label>Haldi Address</label><input type="text" id="haldiAddress" value="निवास स्थान">
            </div>

            <div>
                <label>Marriage Date</label><input type="text" id="marriageDate" value="23 अप्रैल 2026">
            </div>
            <div>
                <label>Marriage Time</label><input type="text" id="marriageTime" value="प्रातः 10 बजे">
            </div>
            <div class="full">
                <label>Marriage Address</label><input type="text" id="marriageAddress" value="संत थॉमस चर्च, भैरमगढ़">
            </div>

            <div>
                <label>Reception Date</label><input type="text" id="receptionDate" value="23 अप्रैल 2026">
            </div>
            <div>
                <label>Reception Time</label><input type="text" id="receptionTime" value="शाम 5 बजे">
            </div>
            <div class="full">
                <label>Reception Address</label><input type="text" id="receptionAddress" value="निवास स्थान">
            </div>

            <div class="full">
                <h3>Footer & Relatives</h3>
            </div>
            <div class="full">
                <label>Relatives (दर्शनाभिलाषी)</label><textarea id="b_relativesName">कतरीना एक्का, स्व. आनंद कुंवर एक्का...</textarea>
            </div>
            <div class="full">
                <label>Welcome Names (स्वागताकांक्षी)</label><textarea id="b_welcomeName">नीरज, पंकज, पिंगल...</textarea>
            </div>
            <div>
                <label>Kids (मीठी मुस्कान)</label><input type="text" id="b_childrenName" value="जॉय, हेजल, निखिल">
            </div>
            <div>
                <label>Caller (विनीत)</label><input type="text" id="b_callerName" value="श्री दाऊद एक्का एवं श्रीमती मनीषा एक्का">
            </div>
        </div>

        <button id="genBtn" onclick="generateLink()">Link Generate करें और Copy करें</button>

        <div id="result">
            <span class="short-link" id="shortLinkText"></span>
            <strong>Original Long Link:</strong><br>
            <span id="linkText" style="font-size: 0.8rem; color: #666;"></span>
        </div>
    </div>

    <script>
        
        
        // keval ek hi script hai single script hai
        async function generateLink() {
            const baseUrlInput = document.getElementById('baseUrl').value;
            const btn = document.getElementById('genBtn');

            if (!baseUrlInput) {
                alert("कृपया Base URL डालें (जैसे: https://yourwebsite.com/index.html)");
                return;
            }

            // Button Loading State
            btn.disabled = true;
            btn.innerText = "लिंक बन रहा है, कृपया प्रतीक्षा करें...";

            let baseUrl = baseUrlInput.split('?')[0];

            // Added Missing Reception Fields here
            const fields = [
                'coupleEnglishName',
                'g_Image',
                'b_Image',
                'g_Name',
                'g_grandfatherName',
                'g_fatherName',
                'g_Address',
                'b_Name',
                'b_grandfatherName',
                'b_fatherName',
                'b_Address',
                'haldiDate',
                'haldiTime',
                'haldiAddress',
                'marriageDate',
                'timerDate',
                'marriageTime',
                'marriageAddress',
                'receptionDate',
                'receptionTime',
                'receptionAddress',
                'b_relativesName',
                'b_welcomeName',
                'b_childrenName',
                'b_callerName'
            ];

            let data = {};
            fields.forEach(id => {
                const val = document.getElementById(id).value;
                data[id] = val;
            });

            try {
                // Encoding Data
                const jsonStr = JSON.stringify(data);
                const utf8Str = unescape(encodeURIComponent(jsonStr));
                const base64 = btoa(utf8Str);
                const safeBase64 = base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                const finalLongLink = baseUrl + "?v=" + safeBase64;

                // TinyURL API Call for Shortening
                const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(finalLongLink)}`);

                if (response.ok) {
                    const shortUrl = await response.text();

                    document.getElementById('result').style.display = 'block';
                    document.getElementById('shortLinkText').innerText = "Short Link: " + shortUrl;
                    document.getElementById('linkText').innerText = finalLongLink;

                    // Copy Short Link to Clipboard
                    await navigator.clipboard.writeText(shortUrl);
                    alert("छोटा लिंक सफलतापूर्वक जनरेट और कॉपी हो गया है!");
                } else {
                    throw new Error("Shortener API failed");
                }

            } catch (err) {
                console.error(err);
                alert("लिंक छोटा करने में समस्या आई। लंबा लिंक दिखाया जा रहा है।");
                // Fallback to Long Link if API fails
                document.getElementById('result').style.display = 'block';
                document.getElementById('linkText').innerText = finalLongLink;
            } finally {
                // Reset Button
                btn.disabled = false;
                btn.innerText = "Link Generate करें और Copy करें";
            }
        }
    </script>

</body>
</html>
